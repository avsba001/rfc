name: build-windows-x86-exe

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2019

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (x86)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download and stage LibreOffice + ImageMagick
        shell: pwsh
        run: ./scripts/download_windows_deps.ps1

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm \
            --name docx-pdf-jpg-converter \
            --onedir \
            --add-data "third_party\LibreOffice;third_party\LibreOffice" \
            --add-data "third_party\ImageMagick;third_party\ImageMagick" \
            src/main.py

      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx-pdf-jpg-converter-windows-x86
          path: dist/docx-pdf-jpg-converter/
